<!DOCTYPE html> <html lang="de"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Mein Scooter Tuner</title> <style> body { font-family: Arial; background:#0a0a0a; color:#00ff00; margin:0; padding:20px; text-align:center; } button { padding:15px 40px; font-size:20px; margin:10px; background:#00ff00; color:#000; border:none; border-radius:8px; cursor:pointer; } .speed { font-size:70px; font-weight:bold; margin:30px 0; } .log { background:#111; border:1px solid #00ff00; padding:15px; height:280px; overflow:auto; text-align:left; margin:20px auto; width:90%; } </style> </head> <body> <h1>Mein Scooter Tuner</h1> <button onclick="connect()">Scooter verbinden</button> <div class="speed">🏍 <span id="currSpeed">0.0</span> km/h</div> <div> <label>Max Speed: <input type="range" id="maxS" min="10" max="80" value="35" oninput="upd(this)"> <span id="maxSV">35</span> km/h</label><br><br> <label><input type="checkbox" id="zeroS"> Bei 0 km/h sofort losfahren</label><br><br> <label>Power: <input type="range" id="mpc" min="20000" max="90000" value="52000" oninput="upd(this)"> <span id="mpcV">52000</span></label> </div> <button onclick="sendSettings()">Einstellungen übertragen</button> <button onclick="disconnect()">Trennen</button> <div class="log" id="log"></div> <script> let dev, tx, poll; function log(t) { const d = document.getElementById('log'); d.innerHTML += new Date().toLocaleTimeString() + " " + t + "<br>"; d.scrollTop = 99999; } async function connect() { try { log("Suche Scooter..."); dev = await navigator.bluetooth.requestDevice({ filters: [{namePrefix:"Ninebot"},{namePrefix:"Segway"},{namePrefix:"Xiaomi"}], optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"] }); const server = await dev.gatt.connect(); const svc = await server.getPrimaryService("0000ffe0-0000-1000-8000-00805f9b34fb"); tx = await svc.getCharacteristic("0000ffe1-0000-1000-8000-00805f9b34fb"); const rx = await svc.getCharacteristic("0000ffe1-0000-1000-8000-00805f9b34fb"); await rx.startNotifications(); rx.addEventListener("characteristicvaluechanged", e => { const b = new Uint8Array(e.target.value.buffer); if (b.length > 10) { const kmh = ((b[6]<<8) | b[7]) / 10; document.getElementById("currSpeed").textContent = kmh.toFixed(1); } }); log("Verbunden!"); poll = setInterval(() => sendRaw([0x55,0xAA,0x03,0x20,0x00,0x00,0x00,0x00]), 700); } catch(e) { log("Fehler: " + e); } } function upd(el) { document.getElementById(el.id + "V").textContent = el.value; } async function sendRaw(bytes) { if (tx) await tx.writeValue(new Uint8Array(bytes)); } async function sendSettings() { if (!tx) return log("Nicht verbunden!"); const max = parseInt(document.getElementById("maxS").value); await sendRaw([0x55, 0xAA, 0x04, 0x3A, max, 0x00, 0x00, 0x00]); log("Settings gesendet!"); } function disconnect() { if (poll) clearInterval(poll); if (dev) dev.gatt.disconnect(); log("Getrennt."); } </script> </body> </html>
